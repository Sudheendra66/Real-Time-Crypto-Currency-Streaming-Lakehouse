version: 2

models:
  - name: crypto_summary
    columns:
      - name: symbol
        tests:
          - not_null
          - unique

      - name: avg_price
        tests:
          - not_null

  - name: top_volume_assets
    columns:
      - name: symbol
        tests:
          - not_null

  - name: market_overview
    columns:
      - name: total_assets
        tests:
          - not_null

  - name: asset_performance
    columns:
      - name: symbol
        tests:
          - not_null
      - name: avg_price
        tests:
          - not_null
      - name: price_volatility_pct
        tests:
          - not_null
